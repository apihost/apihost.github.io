      url: 'https://uaik.github.io/'
      weight: 10
    - name: 'LiveStreet'
      icon: 'fas fa-briefcase'
      description: 'Разработка для социального движка LiveStreet.'
      content: |
        Сначала мне очень не нравился LiveStreet CMS. Но потом я попробовал шаблон "Developer-Kit" от vOFFka на основе
        Bootstrap и с этим шаблоном LiveStreet для меня заиграл новыми красками. И так заиграл, что я выпустил для своих
        проектов и некоторое время поддерживал собственные модули и модификацию этого шаблона под названием
        "Developer-Kit MOD", в которой я исправлял ошибки в вёрстке и обновлял компоненты.

        Developer-Kit MOD отличается от оригинала следующими параметрами:

        - Чтобы не править оригинальную тему `default`, была создана новая - `system`.
        - Добавлены иконки Font Awesome для верхней навигации и выпадающей панели пользователя.
        - Добавлены кнопки обновления прямого эфира и списка блогов. В оригинальной версии эти кнопки отсутствуют.
        - Twitter Bootstrap обновлён до версии `3.3.5`.
        - Добавлена директория `custom/`, в которой располагаются дополнительные шаблоны.
        - Код названия сайта вынесен в отдельный шаблон `sitename.tpl` и размещён в директории `custom/`.
        - Статистика производительности отображается только для основного администратора с `ID = 1`.
      dates:
        - '2015-10-06T00:00:00Z'
      url: ''
      weight: 10
