      dates:
        - '2009-05-01T05:00:00Z'
      url: ''
      weight: 10
    - name: 'Flarum Russian Community'
      icon: 'fas fa-briefcase'
      description: 'Разработка для форумного движка Flarum.'
      content: |
        Отличный движок для контентных проектов, таких как блог или форум. Взялся за его перевод в 2015 году.
        В итоге, разработчики объявили мой перевод официальным и включили в свой дистрибутив.

        - Являюсь куратором [русской локализации](https://discuss.flarum.org/d/1545) движка Flarum.
        - Открыл российское представительство Flarum - Flarus Community Center.
      dates:
        - '2015-12-01T00:00:00Z'
      url: 'https://discuss.flarum.org/d/1545'
      weight: 10
    - name: 'Furry Community'
      icon: 'fas fa-briefcase'
      description: 'Портал сообщества Furry.'
      content: |
        Портальная система для сообщества Furry. Нашёл один портал по тематике Furry. Пообщался с участниками.
        Мне рассказали, что администратор куда-то пропал и уже несколько месяцев не выходит на связь.
        А сам сайт переодически умирает.

        Я предложил участникам свои услуги по созданию отдельного портала со всеми плюшками.
        Путь этого проекта был долгим и трудным с несколькими реинкарнациями. Этапы жизни:

        - Начало положил сайт Furdom на движке Drupal. Присутствовал локальный чат, форум, галерея и географическая карта пользователей.
        - Furdom переезжает на движок NodeBB. Проект представляет собой форум субкультуры Furry.
        - Furdom преобразуется в FURS Network.
        - Разрабатывается WIKI для сбора и накопления информации. Участники наполняют базу знаний своими статьями.
        - Запускается локальное радио RadioWTF, на котором участники и приглашённые гости ведут беседы, обсуждают различные события на проекте и в мире.
        - Открываются несколько чатов и галерея изображений.
        - Готовится разработка собственной игры по тематике Furry. Но не срослось. :smile:
        - FURS преобразуется в FurryChat. Основное общение перетекает на одноимённый сервер Discord.
        - Создатель завершает развитие проекта. Проект передаётся администраторам.
      dates:
        - '2019-01-22T00:00:00Z'
      url: ''
      weight: 10
    - name: 'GitHub Actions Store'
      icon: 'fas fa-briefcase'
      description: 'Организация по разработке и хранении GitHub Actions.'
      content: |
        Хранилище со сценариями к GitHub Actions. Другие репозитории подключаются к этим сценариям, выполняя указанные
        инструкции для автоматизированного решения задач.
      dates:
        - '2022-08-31T00:00:00Z'
      url: 'https://github.com/ghastore'
      weight: 10
    - name: 'GitHub Package Store'
      icon: 'fas fa-briefcase'
      description: 'Организация по разработке и хранении скриптов и пакетов для различных систем.'
      content: |
        Созданное на GitHub’е общее хранилище со скриптами, расширениями и дополнениями для CMF / CMS,
        а также место по разработке пакетов для дистрибутивов Linux. Каждый репозиторий хранилища представляет собой
        отдельный пакет или дополнение.

        - Пакеты для CMF / CMF, написанные на PHP, автоматически публикуются в репозитории [Packagist](https://packagist.org/packages/pkgstore/).
        - Пакеты для дистрибутивов Linux автоматически отправляются в соответствующую систему сборки.
      dates:
        - '2021-06-11T00:00:00Z'
      url: 'https://github.com/pkgstore'
      weight: 10
    - name: 'GitHub Universal AIK'
      icon: 'fas fa-briefcase'
      description: 'Организация по разработке и хранении сценариев автоматической установки ОС.'
      content: |
        Хранилище со сценариями установки для дистрибутивов Linux и MS Windows.
        Системы установки Linux подключаются к этому хранилищу, забирая сценарии и выполняя указанные инструкции.
      dates:
